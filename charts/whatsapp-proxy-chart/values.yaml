# Default values for whatsapp-proxy-chart.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 10

image:
  repository: facebook/whatsapp_proxy
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "latest"

public_ip: "10.0.0.1"

imagePullSecrets: {}
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: "whatsapp-proxy"

podAnnotations: {}

podSecurityContext:
  # fsGroup: 2000
  sysctls:
  - name: net.ipv4.ip_unprivileged_port_start
    value: "0"


securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: LoadBalancer
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: nlb
  port: 8080
  http_port: 80
  https_port: 443
  jabber_port: 5222
  media_port: 587
  # http_proxy_port: 8080
  # https_proxy_port: 8443
  # jabber_proxy_port: 8222
  # media_proxy_port: 7777
  # stats_port: 8199

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: waprox.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

# HAProxy configuration file contents.
# Edit this to customize proxy behavior without rebuilding the image.
haproxyConfig: |
  global
    tune.bufsize 4096
    maxconn 27500
    spread-checks 5
    ssl-server-verify none

  defaults
    mode tcp
    timeout client-fin 1s
    timeout server-fin 1s
    timeout connect 5s
    timeout client 200s
    timeout server 200s
    default-server inter 10s fastinter 1s downinter 3s error-limit 50

  listen stats
    bind :::8199
    mode http
    http-request use-service prometheus-exporter if { path /metrics }
    stats uri /

  frontend haproxy_v4_http
    maxconn 27495
    #PUBLIC_IP

    bind ipv4@*:80
    bind ipv4@*:8080 accept-proxy

    default_backend wa_http

  frontend haproxy_v4_https
    maxconn 27495
    #PUBLIC_IP

    bind ipv4@*:443 ssl crt /etc/haproxy/ssl/proxy.whatsapp.net.pem
    bind ipv4@*:8443 ssl crt /etc/haproxy/ssl/proxy.whatsapp.net.pem accept-proxy

    default_backend wa

  frontend haproxy_v4_xmpp
    maxconn 27495
    #PUBLIC_IP

    bind ipv4@*:5222
    bind ipv4@*:8222 accept-proxy

    default_backend wa

  frontend haproxy_v4_whatsapp_net
    maxconn 27495
    #PUBLIC_IP

    bind ipv4@*:587
    bind ipv4@*:7777

    default_backend wa_whatsapp_net

  backend wa_whatsapp_net
    default-server check inter 60000 observe layer4
    server whatsapp_net_443 whatsapp.net:443

  backend wa
    default-server check inter 60000 observe layer4 send-proxy
    server g_whatsapp_net_5222 g.whatsapp.net:5222

  backend wa_http
    default-server check inter 60000 observe layer4 send-proxy
    server g_whatsapp_net_80 g.whatsapp.net:80
